agent:
  name: "Dental AI Agent"
  version: "0.1.0"
  debug: true
  description: "LangGraph-based workflow for dental case and order management"

checkpointer:
  type: "memory"  # Options: memory, postgres, sqlite
  ttl: 3600       # State expiration time in seconds
  max_history: 100

llm:
  provider: "openai"  # Options: openai, anthropic, local
  model: "gpt-4"
  api_key: "${OPENAI_API_KEY}"
  temperature: 0.7
  max_tokens: 2000

tools:
  timeout: 30
  retries: 3
  logging_enabled: true

logging:
  level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/agent.log"
